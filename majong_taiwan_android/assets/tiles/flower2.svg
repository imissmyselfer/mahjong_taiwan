<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- 牌背 -->
  <rect width="100" height="120" fill="white" stroke="#333333" stroke-width="1.5" rx="3"/>
  
  <!-- 牌面背景（淡色） -->
  <rect x="3" y="3" width="94" height="114" fill="#f9f9f9" rx="2"/>
  
  <!-- 花牌裝飾邊框 -->
  <rect x="8" y="8" width="84" height="104" fill="none" stroke="#FFD93D" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="100" fill="none" stroke="#FFD93D" stroke-width="0.5" opacity="0.5"/>
  
  <!-- 花朵圖案（簡約） -->
  <g id="flower-design">
    <!-- 中心圓形 -->
    <circle cx="50" cy="45" r="8" fill="#FFD93D" opacity="0.8"/>
    
    <!-- 花瓣（5 瓣） -->
    <circle cx="50" cy="30" r="5" fill="#FFD93D" opacity="0.6"/>
    <circle cx="63" cy="38" r="5" fill="#FFD93D" opacity="0.6"/>
    <circle cx="58" cy="52" r="5" fill="#FFD93D" opacity="0.6"/>
    <circle cx="42" cy="52" r="5" fill="#FFD93D" opacity="0.6"/>
    <circle cx="37" cy="38" r="5" fill="#FFD93D" opacity="0.6"/>
  </g>
  
  <!-- 花牌號碼（上方） -->
  <text x="50" y="75" font-family="serif" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#333333">夏</text>
  
  <!-- 英文名稱（下方） -->
  <text x="50" y="92" font-family="serif" font-size="10" 
        text-anchor="middle" fill="#666666" opacity="0.7">Summer</text>
  
  <!-- 版本標記 -->
  <text x="50" y="110" font-family="monospace" font-size="7" 
        text-anchor="middle" fill="#999999" opacity="0.5">FLOWER</text>
</svg>
